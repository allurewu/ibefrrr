<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="50%" stop-color="#059669" />
      <stop offset="100%" stop-color="#047857" />
    </linearGradient>
    <linearGradient id="purple" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366f1" />
      <stop offset="100%" stop-color="#8b5cf6" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="128" fill="#09090b"/>
  <!-- Border glow -->
  <rect x="16" y="16" width="480" height="480" rx="112" fill="none" stroke="url(#glow)" stroke-width="8" opacity="0.4"/>
  <!-- Chart Arrow -->
  <path d="M128 384 L200 312 L280 360 L384 220" fill="none" stroke="url(#glow)" stroke-width="32" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Arrow Head -->
  <path d="M320 220 L384 220 L384 284" fill="none" stroke="url(#glow)" stroke-width="32" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Value Pillar (VA Core Concept) -->
  <circle cx="384" cy="220" r="16" fill="#10b981"/>
  <!-- Modern Geometric Accent -->
  <text x="50%" y="460" font-family="'Roboto', system-ui, sans-serif" font-weight="900" font-size="72" fill="#ffffff" text-anchor="middle" letter-spacing="4">VA</text>
</svg>
